name: multi-jobs

on:
  push:
    branches:
      - main

env:
  APP_NAME: demo-app   # fixed casing

jobs:
  build:
    runs-on: ubuntu-latest
    environment: multi
    env:
      ENVIRONMENT: staging
    outputs:
      date: ${{steps.output1.outputs.today}}

    steps:
      - name: Build step
        if: github.ref_name == 'main'
        id: output1
        env:
          VERSION: 1.0.0
        run: |
          echo "App Name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "var : ${{ vars.APP_DATA }}"
          echo "secret: ${{ secrets.APP_PASS }}"
          echo "today=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: failed
        continue-on-error: true
        run: exit 1
      - name: check prev
        if: failure()
        run: echo "failed state before"

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "Running tests ${{ needs.build.outputs.date}}"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploying"
      - name: This step may fail
        continue-on-error: true
        run: exit 1

      - name: Next step still runs
        run: echo "Workflow continues even if previous step failed"

