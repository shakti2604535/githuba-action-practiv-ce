name: multi-jobs
on:
 push:
   branches:
      - main
env:
 app_name: demo-app

jobs:
  build:
  env: 
    ENVIRONMENT: staging
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        env:
          VERSION: 1.0.0
        run: |
          echo "App Name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "var : ${{vars.APP_DATA}}
          echo "secret ${{secrets.APP_PASS}}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "Running tests"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploying"