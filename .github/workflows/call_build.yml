name: call build
on:
  workflow_dispatch

jobs:
  build:
    uses: ./.github/workflows/reuseable.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}
  need_version:
     runs-on: ubuntu-latest
     needs: build

     steps:
      - name: Print verskhion
        run: |
          echo "Build version is: ${{ needs.build.outputs.build_version }}"