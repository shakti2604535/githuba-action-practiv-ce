name: reusable
on:
  workflow_call:
      inputs:
        app_name:
            description: "python"
            required: true
            type: string
        environment:
            description: "Deployment environment"
            required: true
            default: staging
            type: string
      secrets:
        docker_token:
            required: true
      outputs:   # 👈 expose output to caller
        build_version:
            description: "Generated build version"
            value: ${{ jobs.reused.outputs.build_version }}
        


jobs:
  reused:
     runs-on: ubuntu-latest
     outputs:
        build_version: ${{ steps.version.outputs.build_version}}
     steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: output build version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v1.0-${SHORT_SHA}"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Print build info
        run: |
          echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

      - name: Check Docker token
        run: |
          if [ -n "${{ secrets.docker_token }}" ]; then
            echo "Docker token is set: true"
          else
            echo "Docker token is NOT set"
          fi
  