name: pr information
on:
 pull_request:
       types: [opened, synchronize, reopened, closed]

jobs:
  pr_info:
       runs-on: ubuntu-latest
       steps:
        - name: Print event type
          run: echo "Event type ${{ github.event.action }}"

        - name: Print PR title
          run: echo "PR title ${{ github.event.pull_request.title }}"

        - name: Print PR author
          run: echo "PR author ${{ github.event.pull_request.user.login }}"

        - name: Print branches
          run: |
             echo "Source branch: ${{ github.event.pull_request.head.ref }}"
             echo "Target branch: ${{ github.event.pull_request.base.ref }}"

        - name: Run only when PR is merged
          if: github.event.action == 'closed' && github.event.pull_request.merged == true
          run: echo "PR was merged 🎉"
          
  file-size-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file sizes (>1MB)
        run: |
          echo "Checking for large files..."
          LARGE_FILES=$(find . -type f -size +1M)

          if [ -n "$LARGE_FILES" ]; then
            echo "❌ Large files detected:"
            echo "$LARGE_FILES"
            exit 1
          else
            echo "✅ No large files found"
          fi

  branch-name-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Branch name: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" =~ ^(feature|fix|docs)/.+ ]]; then
            echo "✅ Branch name is valid"
          else
            echo "❌ Invalid branch name"
            echo "Use: feature/*, fix/*, or docs/*"
            exit 1
          fi

  pr-body-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR description
        run: |
          BODY="${{ github.event.pull_request.body }}"

          if [ -z "$BODY" ]; then
            echo "⚠️ Warning: PR description is empty"
          else
            echo "✅ PR description exists"
          fi