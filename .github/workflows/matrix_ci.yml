name: matric_pr
on: 
 push:
   branches:
     - main

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
         python-version: [3.10.0-alpha.1, 3.11, 3.12]
    steps:
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: print python version
        run: python --version
