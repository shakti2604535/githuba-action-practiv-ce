name: matric_pr
on: 
 push:
   branches:
     - main

jobs:
  matrix:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
         os: [ubuntu-latest, windows-latest]
         python-version: ["3.10", "3.11", "3.12"]
         exclude:
           - os: windows-latest
             python-version: "3.10"
    steps:
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: print python version
        if: matrix.python-version == '3.11'
        run: exit 1
      - name: Print Python version
        run: |
          echo "OS: ${{ matrix.os }}"
          python --version
