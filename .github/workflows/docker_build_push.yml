name: docker build & push
on:
  push:
     branches:
         - main
         - feature/**
    
jobs:
  docker:
     runs-on: ubuntu-latest
     environment: multi

     steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: Set short SHA
          id: vars
          run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        - name: docker build
          run: |
             docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest .
             docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:sha-${SHA_SHORT} .
        - name: login to dockerhub
          if: github.ref == 'refs/heads/main'
          run: |
             echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

        - name: Push Docker image
          if: github.ref == 'refs/heads/main'
          run: |
             docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest
             docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:sha-${SHA_SHORT}


